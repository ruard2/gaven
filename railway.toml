[build]
builder = "nixpacks"

[deploy]
startCommand = "npx prisma db push --accept-data-loss && npx next start -p ${PORT:-3000}"
healthcheckPath = "/"
healthcheckTimeout = 60
restartPolicyType = "on_failure"

[[deploy.cronJobs]]
name = "daily-reminders"
schedule = "0 7 * * *"
command = "curl -s -H \"x-cron-secret: $CRON_SECRET\" http://localhost:${PORT:-3000}/api/cron/reminders"
