[build]
builder = "nixpacks"

[deploy]
startCommand = "npx prisma migrate resolve --rolled-back 0001_init 2>/dev/null; npx prisma migrate deploy && cp -r .next/static .next/standalone/.next/static && cp -r public .next/standalone/public && HOSTNAME=0.0.0.0 node .next/standalone/server.js"
healthcheckPath = "/"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
